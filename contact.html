<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Canvas Print</title>
    <meta name="description" content="Get in touch with Canvas Print in Sunamganj. Call, email, WhatsApp, or send us a message and we'll respond within one business day.">
    <link rel="canonical" href="https://canvasprintbd.com/contact.html">
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#1b1712">
    <script>(function(){try{var t=localStorage.getItem('theme');if(!t){t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/utilities.css">
</head>
<body>
<a href="#main" class="sr-only">Skip to content</a>
<div data-include="/partials/header.html"></div>

<main id="main">
    <section class="page-header">
        <div class="container">
            <div class="reveal">
                <h1 class="h1 text-balance" data-i18n="contact.pageTitle"></h1>
                <p class="lede" data-i18n="contact.pageDesc"></p>
            </div>
        </div>
    </section>

    <section class="section--tight">
        <div class="container">
            <div class="contact-grid">
                <div class="reveal">
                    <div data-render="contact-details"></div>
                    <a href="#" data-wa class="btn btn-accent btn-lg mt-6"><span data-icon="whatsapp"></span> <span data-i18n="contact.whatsappChat"></span></a>
                    <div class="map-stub"><span data-icon="map-pin"></span> <span class="ml-2" data-i18n="contact.mapNote"></span></div>
                </div>

                <div class="panel panel-pad reveal" data-delay="1">
                    <h2 class="h3 mb-6" data-i18n="contact.formTitle"></h2>
                    <form data-ajax action="/forms/contact.php" method="post" novalidate>
                        <input type="text" name="website" tabindex="-1" autocomplete="off" class="sr-only" aria-hidden="true">
                        <div class="form-grid cols-2">
                            <div class="field">
                                <label for="c-name" data-i18n="contact.name"></label>
                                <input type="text" id="c-name" name="name" required>
                                <span class="error-text">Required</span>
                            </div>
                            <div class="field">
                                <label for="c-email" data-i18n="contact.email"></label>
                                <input type="email" id="c-email" name="email" required>
                                <span class="error-text">Valid email required</span>
                            </div>
                            <div class="field col-span">
                                <label for="c-subject" data-i18n="contact.subject"></label>
                                <input type="text" id="c-subject" name="subject" required>
                                <span class="error-text">Required</span>
                            </div>
                            <div class="field col-span">
                                <label for="c-message" data-i18n="contact.message"></label>
                                <textarea id="c-message" name="message" required></textarea>
                                <span class="error-text">Required</span>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg btn-block mt-6"><span data-i18n="common.sendMessage"></span> <span data-icon="arrow-right"></span></button>
                        <p class="form-msg mt-3 text-sm" role="status"></p>
                    </form>
                    <div class="success-panel hidden" data-success>
                        <div class="success-icon" data-icon="check"></div>
                        <h2 class="h3" data-i18n="contact.successTitle"></h2>
                        <p class="muted mt-3" data-i18n="contact.successText"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<div data-include="/partials/footer.html"></div>
<script src="/assets/js/i18n.js" defer></script>
<script src="/assets/js/data.js" defer></script>
<script src="/assets/js/artwork.js" defer></script>
<script src="/assets/js/main.js" defer></script>
</body>
</html>
