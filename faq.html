<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ — Canvas Print</title>
    <meta name="description" content="Answers to common questions about file formats, turnaround, delivery, minimum orders, payment, and print quality.">
    <link rel="canonical" href="https://canvasprintbd.com/faq.html">
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#1a3a2e">
    <script>(function(){try{var t=localStorage.getItem('theme');if(!t){t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Text:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/components.css">
</head>
<body>
<a href="#main" class="sr-only">Skip to content</a>
<div data-include="/partials/header.html"></div>

<main id="main">
    <section class="page-header section--tight">
        <div class="container">
            <div class="faq-layout">
                <div class="faq-head reveal">
                    <span class="eyebrow" data-i18n="faq.eyebrow"></span>
                    <h1 class="h1 text-balance" data-i18n="faq.pageTitle"></h1>
                    <p class="lede" style="margin-top:18px;" data-i18n="faq.description"></p>
                </div>
                <div class="accordion reveal" data-accordion data-render="faq"></div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="cta-band reveal">
                <h2 class="h1 text-balance" data-i18n="cta.title"></h2>
                <p class="lede" data-i18n="cta.description"></p>
                <div class="cta-actions">
                    <a href="/quote.html" class="btn btn-accent btn-lg"><span data-i18n="common.getQuote"></span> <span data-icon="arrow-right"></span></a>
                    <a href="/contact.html" class="btn btn-secondary btn-lg" data-i18n="common.contactUs"></a>
                </div>
            </div>
        </div>
    </section>
</main>

<div data-include="/partials/footer.html"></div>
<script src="/assets/js/i18n.js" defer></script>
<script src="/assets/js/data.js" defer></script>
<script src="/assets/js/artwork.js" defer></script>
<script src="/assets/js/main.js" defer></script>
</body>
</html>
