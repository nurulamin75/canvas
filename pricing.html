<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing — Canvas Print</title>
    <meta name="description" content="Simple, transparent pricing for printing in Bangladesh. Pick a starting plan and request a tailored quote for your exact specs.">
    <link rel="canonical" href="https://canvasprintbd.com/pricing.html">
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#1b1712">
    <script>(function(){try{var t=localStorage.getItem('theme');if(!t){t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/components.css">
</head>
<body>
<a href="#main" class="sr-only">Skip to content</a>
<div data-include="/partials/header.html"></div>

<main id="main">
    <section class="page-header">
        <div class="container">
            <div class="reveal">
                <h1 class="h1 text-balance" data-i18n="pricing.pageTitle"></h1>
                <p class="lede" data-i18n="pricing.pageDesc"></p>
            </div>
        </div>
    </section>

    <section class="section--tight">
        <div class="container"><div class="price-grid" data-render="pricing"></div></div>
    </section>

    <section class="section">
        <div class="container">
            <div class="section-head center">
                <h2 class="h2 text-balance" data-i18n="pricing.guideTitle"></h2>
                <p class="lede" data-i18n="pricing.guideDesc"></p>
            </div>
            <div class="reveal" data-render="price-table"></div>
            <p class="muted" style="margin-top:16px;font-size:0.9rem;" data-i18n="pricing.note"></p>
        </div>
    </section>
</main>

<div data-include="/partials/footer.html"></div>
<script src="/assets/js/i18n.js" defer></script>
<script src="/assets/js/data.js" defer></script>
<script src="/assets/js/artwork.js" defer></script>
<script src="/assets/js/main.js" defer></script>
</body>
</html>
