<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Print — Premium Printing in Sunamganj, Bangladesh</title>
    <meta name="description" content="High-quality printing services for businesses, events, and personal projects across Bangladesh — from business cards to large-format banners.">
    <link rel="canonical" href="https://canvasprintbd.com/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Canvas Print — Premium Printing in Sunamganj, Bangladesh">
    <meta property="og:description" content="High-quality printing services for businesses, events, and personal projects across Bangladesh.">
    <meta property="og:image" content="https://canvasprintbd.com/assets/img/og.svg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#111113">
    <script>(function(){try{var t=localStorage.getItem('theme');if(!t){t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Text:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"LocalBusiness","name":"Canvas Print","url":"https://canvasprintbd.com","telephone":"+8801700000000","email":"hello@canvasprintbd.com","address":{"@type":"PostalAddress","streetAddress":"Jamalganj","addressLocality":"Sunamganj","addressRegion":"Sylhet","addressCountry":"BD"},"priceRange":"৳৳"}
    </script>
</head>
<body>
<a href="#main" class="sr-only">Skip to content</a>
<div data-include="/partials/header.html"></div>

<main id="main">
    <section class="hero">
        <div class="container">
            <div class="hero-grid">
                <div class="reveal">
                    <span class="badge"><span class="dot"></span> <span data-i18n="hero.badge"></span></span>
                    <h1 class="h-hero hero-title">
                        <span data-i18n="hero.titleA"></span> <span class="highlight" data-i18n="hero.titleHighlight"></span><br><span data-i18n="hero.titleB"></span>
                    </h1>
                    <p class="lede" style="max-width:520px;" data-i18n="hero.subtitle"></p>
                    <div class="hero-cta">
                        <a href="/quote.html" class="btn btn-primary btn-lg"><span data-i18n="common.getQuote"></span> <span data-icon="arrow-right"></span></a>
                        <a href="/services.html" class="btn btn-secondary btn-lg" data-i18n="common.viewServices"></a>
                    </div>
                    <div class="hero-trust">
                        <div class="avatar-row" aria-hidden="true">
                            <span style="background:var(--tomato)">H</span><span style="background:var(--forest)">S</span>
                            <span style="background:var(--blue)">G</span><span style="background:#9d174d">B</span>
                        </div>
                        <span data-i18n="hero.trusted"></span>
                    </div>
                </div>
                <div class="hero-visual reveal" data-delay="2">
                    <img src="/assets/img/hero-img.png" alt="Canvas Print — premium quality printing" loading="eager" class="hero-img">
                </div>
            </div>
        </div>
    </section>

    <section class="section--tight"><div class="container"><div data-render="stats"></div></div></section>

    <section class="section--tight"><div class="container trusted reveal" data-render="trusted"></div></section>

    <section class="section">
        <div class="container">
            <div class="section-head center">
                <span class="eyebrow" style="justify-content:center;" data-i18n="services.eyebrow"></span>
                <h2 class="h2 text-balance" data-i18n="services.title"></h2>
                <p class="lede" data-i18n="services.description"></p>
            </div>
            <div class="grid grid-3" data-render="services" data-home="true"></div>
            <div class="text-center mt-lg">
                <a href="/services.html" class="btn btn-secondary btn-lg"><span data-i18n="common.allServices"></span> <span data-icon="arrow-right"></span></a>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="section-head center">
                <span class="eyebrow" style="justify-content:center;" data-i18n="why.eyebrow"></span>
                <h2 class="h2 text-balance" data-i18n="why.title"></h2>
                <p class="lede" data-i18n="why.description"></p>
            </div>
            <div class="grid grid-3" data-render="why"></div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="section-head">
                <span class="eyebrow" data-i18n="work.eyebrow"></span>
                <h2 class="h2 text-balance" data-i18n="work.title"></h2>
                <p class="lede" data-i18n="work.description"></p>
            </div>
            <div class="grid grid-4" data-render="work" data-limit="8"></div>
            <div class="text-center mt-lg">
                <a href="/portfolio.html" class="btn btn-secondary btn-lg"><span data-i18n="common.fullPortfolio"></span> <span data-icon="arrow-right"></span></a>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="section-head center">
                <span class="eyebrow" style="justify-content:center;" data-i18n="process.eyebrow"></span>
                <h2 class="h2 text-balance" data-i18n="process.title"></h2>
                <p class="lede" data-i18n="process.description"></p>
            </div>
            <div class="process-list" data-render="process"></div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="section-head center">
                <span class="eyebrow" style="justify-content:center;" data-i18n="reviews.eyebrow"></span>
                <h2 class="h2 text-balance" data-i18n="reviews.title"></h2>
                <p class="lede" data-i18n="reviews.description"></p>
            </div>
            <div class="carousel" data-carousel>
                <div class="reviews-track" data-track data-render="reviews"></div>
                <div class="carousel-nav">
                    <button class="icon-btn" type="button" data-prev aria-label="Previous" style="transform:rotate(180deg)"><span data-icon="arrow-right"></span></button>
                    <button class="icon-btn" type="button" data-next aria-label="Next"><span data-icon="arrow-right"></span></button>
                </div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="faq-grid">
                <div class="section-head" style="margin-bottom:0;">
                    <span class="eyebrow" data-i18n="faq.eyebrow"></span>
                    <h2 class="h2 text-balance" data-i18n="faq.title"></h2>
                    <p class="lede" data-i18n="faq.description"></p>
                </div>
                <div class="accordion" data-accordion data-render="faq" data-limit="6"></div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="cta-band reveal">
                <span class="eyebrow" style="color:var(--lime);justify-content:center;" data-i18n="hero.titleHighlight"></span>
                <h2 class="h1 text-balance" style="margin-top:14px;" data-i18n="cta.title"></h2>
                <p class="lede" data-i18n="cta.description"></p>
                <div class="cta-actions">
                    <a href="/quote.html" class="btn btn-accent btn-lg"><span data-i18n="common.getQuote"></span> <span data-icon="arrow-right"></span></a>
                    <a href="#" data-wa class="btn btn-secondary btn-lg"><span data-icon="whatsapp"></span> WhatsApp</a>
                </div>
            </div>
        </div>
    </section>
</main>

<div data-include="/partials/footer.html"></div>

<script src="/assets/js/i18n.js" defer></script>
<script src="/assets/js/data.js" defer></script>
<script src="/assets/js/artwork.js" defer></script>
<script src="/assets/js/main.js" defer></script>
</body>
</html>
