<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — Canvas Print</title>
    <meta name="description" content="Canvas Print is a Sunamganj-based printing studio built on craft, honesty, and reliable delivery for businesses across Bangladesh.">
    <link rel="canonical" href="https://canvasprintbd.com/about.html">
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#1a3a2e">
    <script>(function(){try{var t=localStorage.getItem('theme');if(!t){t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Text:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/components.css">
</head>
<body>
<a href="#main" class="sr-only">Skip to content</a>
<div data-include="/partials/header.html"></div>

<main id="main">
    <section class="page-header">
        <div class="container">
            <div class="reveal">
                <span class="eyebrow" data-i18n="about.eyebrow"></span>
                <h1 class="h1 text-balance" data-i18n="about.pageTitle"></h1>
                <p class="lede" data-i18n="about.pageDesc"></p>
            </div>
        </div>
    </section>

    <section class="section--tight"><div class="container"><div data-render="stats"></div></div></section>

    <section class="section">
        <div class="container">
            <div class="service-block">
                <div class="art-wrap reveal" data-art="brochure"></div>
                <div class="reveal" data-delay="1">
                    <span class="eyebrow" data-i18n="about.storyEyebrow"></span>
                    <h2 class="h2 text-balance" style="margin:14px 0 18px;" data-i18n="about.storyTitle"></h2>
                    <p class="muted" style="margin-bottom:16px;" data-i18n="about.story1"></p>
                    <p class="muted" data-i18n="about.story2"></p>
                </div>
            </div>
        </div>
    </section>

    <section class="section--tight">
        <div class="container">
            <div class="grid grid-3">
                <div class="card reveal" data-delay="1" style="padding:32px;">
                    <div class="why-ico" data-icon="zap"></div>
                    <h3 class="h3" style="margin-bottom:10px;" data-i18n="about.mission"></h3>
                    <p class="muted" data-i18n="about.missionText"></p>
                </div>
                <div class="card reveal" data-delay="2" style="padding:32px;">
                    <div class="why-ico" data-icon="sparkles"></div>
                    <h3 class="h3" style="margin-bottom:10px;" data-i18n="about.vision"></h3>
                    <p class="muted" data-i18n="about.visionText"></p>
                </div>
                <div class="card reveal" data-delay="3" style="padding:32px;">
                    <div class="why-ico" data-icon="shield"></div>
                    <h3 class="h3" style="margin-bottom:10px;" data-i18n="about.promise"></h3>
                    <p class="muted" data-i18n="about.promiseText"></p>
                </div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="section-head center">
                <span class="eyebrow" style="justify-content:center;" data-i18n="about.valuesEyebrow"></span>
                <h2 class="h2 text-balance" data-i18n="about.valuesTitle"></h2>
                <p class="lede" data-i18n="about.valuesDesc"></p>
            </div>
            <div class="grid grid-4" data-render="about-values"></div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="cta-band reveal">
                <h2 class="h1 text-balance" data-i18n="cta.title"></h2>
                <p class="lede" data-i18n="cta.description"></p>
                <div class="cta-actions">
                    <a href="/quote.html" class="btn btn-accent btn-lg"><span data-i18n="common.getQuote"></span> <span data-icon="arrow-right"></span></a>
                    <a href="#" data-wa class="btn btn-secondary btn-lg"><span data-icon="whatsapp"></span> WhatsApp</a>
                </div>
            </div>
        </div>
    </section>
</main>

<div data-include="/partials/footer.html"></div>
<script src="/assets/js/i18n.js" defer></script>
<script src="/assets/js/data.js" defer></script>
<script src="/assets/js/artwork.js" defer></script>
<script src="/assets/js/main.js" defer></script>
</body>
</html>
